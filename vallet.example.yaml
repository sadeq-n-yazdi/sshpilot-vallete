# sshpilot-vallet example configuration.
#
# Precedence: environment variables override this file, which overrides the
# built-in defaults (ADR-0022). Every value shown below is the built-in default
# unless noted; delete anything you do not need to change.
#
# Secrets are NEVER written here. Fields ending in `_ref` take a *reference* of
# the form `scheme:opaque`:
#   env:VALLET_PG_DSN        -> read from the named environment variable
#   file:/run/secrets/pg-dsn -> read from the file (one trailing newline trimmed)
#
# Every leaf can also be set from the environment as VALLET_ + the upper-snaked
# path, e.g. server.public_base_url -> VALLET_SERVER_PUBLIC_BASE_URL.
#
# Durations accept Go syntax (300ms, 15m, 1h30m) plus a day suffix (30d = 720h).

server:
  # production | development. Production is fail-closed: it requires an https
  # public_base_url and a token signing key, and rejects self-signed TLS.
  environment: production
  listen_addr: ":8443"
  # Required in production; must be https://. The externally reachable base URL.
  public_base_url: ""
  # Source IPs/CIDRs of trusted reverse proxies (required for tls.mode upstream).
  trusted_proxies: []

tls:
  # REQUIRED, no default. One of:
  #   acme | cloudflare_origin | manual | csr | upstream | self_signed
  mode: ""
  min_version: "1.2"
  acme:
    directory_url: "https://acme-v02.api.letsencrypt.org/directory"
    # tls_alpn_01 | dns_01
    solver: ""
    dns:
      # manual | api
      mode: ""
      provider: ""
      # Required for dns_01 + api. e.g. env:VALLET_DNS_CREDENTIALS
      credentials_ref: ""
  cloudflare_origin:
    # Required for cloudflare_origin mode. e.g. env:VALLET_CF_API_TOKEN
    api_token_ref: ""
  manual:
    # Both required for manual mode.
    cert_file: ""
    key_file: ""
  csr:
    # All three required for csr mode. The app generates key_file (0600) and
    # writes csr_file for you to have signed; install the returned chain at
    # cert_file. The server refuses to start until cert_file exists.
    key_file: ""
    csr_file: ""
    cert_file: ""
  upstream:
    # TLS terminated by an upstream proxy; trust X-Forwarded-Proto from proxies.
    require_forwarded_proto: true
  # Permit self_signed in production (NOT recommended; production refuses it
  # otherwise).
  allow_self_signed_in_production: false
  # Primary certificate domain (required for acme and csr modes).
  domain: ""
  sans: []

database:
  # sqlite | postgres
  driver: sqlite
  sqlite:
    path: "./data/vallet.db"
  postgres:
    # Required for postgres driver. e.g. file:/run/secrets/pg-dsn
    dsn_ref: ""

auth:
  access_token_ttl: 15m
  refresh_token_max_age: 90d
  # Required in production. e.g. env:VALLET_TOKEN_SIGNING_KEY
  token_signing_key_ref: ""
  providers:
    # At least one provider must be enabled.
    api_token:
      enabled: true
    passkey:
      enabled: false
    oidc:
      enabled: false

rate_limit:
  enabled: true
  # memory | shared
  store: memory
  shared:
    # Required when store is shared.
    address: ""
    # Optional. e.g. env:VALLET_RATE_LIMIT_PASSWORD
    password_ref: ""
  tiers:
    auth: { requests: 5, window: 1m }
    publish: { requests: 60, window: 1m }
    management: { requests: 120, window: 1m }
    admin: { requests: 60, window: 1m }

telemetry:
  log:
    level: info
    format: json
  metrics:
    prometheus:
      # Collect metrics. This does NOT expose them: the scrape endpoint is
      # served only on its own listener, never on the public API listener.
      enabled: true
      # The dedicated address for the scrape endpoint. EMPTY (the default)
      # means the endpoint is not served at all -- nothing answers a scrape.
      # Set it to expose metrics, and bind it somewhere only your monitoring
      # can reach: 127.0.0.1:9090 for a node-local scraper or a sidecar,
      # 0.0.0.0:9090 only when the platform scrapes across a private network.
      # The endpoint is unauthenticated, so this address IS the access control.
      listen_addr: ""
      path: /metrics
    otlp:
      enabled: false
      # Required when enabled. An http:// or https:// URL with no credentials
      # in it -- put the collector's auth header in headers_ref instead.
      endpoint: ""
      # Optional. e.g. env:VALLET_OTLP_HEADERS
      headers_ref: ""
  traces:
    enabled: false
    # Required when enabled. Same rules as the OTLP metrics endpoint.
    endpoint: ""
    # Head-sampling probability in [0,1] for traces this process starts.
    sample_ratio: 1.0

onboarding:
  # invite | open
  mode: invite

blocklist:
  # Optional path to a newline-delimited reserved-identifier seed file.
  seed_file: ""
  extra_entries: []
  allow_entries: []

retention:
  handle_quarantine: 30d
  # How long audit records are kept. Must be > 0 -- 0 is rejected at startup and
  # does NOT mean "keep nothing". To stop purging, set audit_purge_interval: 0.
  audit_retention: 365d
  # How often the retention purge runs. 0 disables purging entirely.
  audit_purge_interval: 24h
  # Records removed per transaction, and the ceiling on one pass. A backlog
  # larger than the ceiling is drained over successive passes.
  audit_purge_batch: 500
  audit_purge_max_per_run: 100000
  max_sets_per_owner: 100

install:
  # Serve the helper installation script and its SHA-256 digest under /install/
  # (ADR-0013, ADR-0029). Enabled by default: the script is the documented
  # bootstrap path for a host that has nothing from this project yet, and it is
  # not secret. Set to false on locked-down installations; both routes then
  # behave exactly like any unknown path.
  enabled: true

docs:
  # Serve the OpenAPI contract and the embedded documentation UI at /docs/
  # (ADR-0021). Enabled by default: the contract is not secret, and consumers
  # need it to build against this API. Set to false on locked-down
  # installations; the routes then behave exactly like any unknown path.
  enabled: true
