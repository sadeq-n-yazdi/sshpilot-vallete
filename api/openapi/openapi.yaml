openapi: 3.1.1
info:
  title: sshpilot-vallete API
  version: 0.1.0
  summary: Publishes SSH public key sets as native authorized_keys documents.
  description: |
    The contract for what the server implements **today**: the two probe
    endpoints, the unauthenticated publish read path, and device management.

    The remaining management endpoints (owner onboarding, handle and key-set
    administration, device pairing, credential enrollment) are **forthcoming**
    and are deliberately absent. A specification that describes unbuilt routes
    cannot be used as a contract, because a consumer has no way to tell the
    parts that are real from the parts that are aspirational. Routes are added
    here as they land, and a contract test fails the build when this document
    and the router disagree in either direction.

    ## Errors on the management API

    Every management error response is the same JSON object and carries no
    diagnostics:

    ```json
    { "status": "error" }
    ```

    This is documented as it actually is. The body does not name a field, a
    reason, or a code, and no error-detail model is described here, because the
    server returns none — a richer schema in this document would promise
    consumers a level of detail they will never receive.

    ## Authorization

    Management endpoints require a bearer token. The owner is taken from that
    token and from nowhere else: **no management route accepts an owner
    identifier as a path, query, or body parameter** (ADR-0004), and a request
    body carrying an unrecognized field is rejected rather than having the
    field ignored — so a request that attempted to assert an owner fails
    outright instead of appearing to succeed.

    A token's scope is checked before any storage is read (ADR-0018). A
    read-only token cannot reach a mutating operation, and a token bound to a
    single device can reach only that device.

    ## Enumeration on the management API

    A device identifier that the caller's token does not own is answered
    **identically** to one that does not exist: the same `404`, the same body.
    An already-revoked device is answered the same way. The three cases are not
    distinguishable and are not documented as separate responses, because the
    indistinguishability is the security property — an authenticated caller
    must not be able to enumerate other owners' devices, or read a device's
    lifecycle state, off a difference between two error responses.

    ## Transport

    HTTPS only (ADR-0015). Plaintext HTTP is not a supported transport for any
    endpoint described here.

    Responses served over a connection known to be HTTPS additionally carry a
    `Strict-Transport-Security` header. It is a transport-wide policy applied to
    every response, including error responses, rather than a property of any one
    operation, so it is not repeated under each response below.

    ## Methods

    `HEAD` is supported wherever `GET` is, and returns the identical status and
    headers with no body. It is spelled out only on the publish routes, where
    ADR-0019 requires it and the handler implements the parity explicitly; on
    the probe endpoints it follows from the same routing rule.

    Any other method on any of these paths is answered with `405 Method Not
    Allowed` and an `Allow: GET, HEAD` header, by the router rather than by a
    handler. It is not repeated under each operation below.

    ## Enumeration

    Every negative verdict on the publish path — an unknown handle, an unknown
    set, a set owned by somebody else, an inactive or non-public set, a
    malformed name — produces one byte-identical `404`. The cases are **not**
    distinguishable, and are not documented as separate responses, because the
    indistinguishability is the security property (ADR-0019): a stranger must
    not be able to read the existence of a handle or set off a difference
    between two error responses.
servers:
  - url: https://{host}
    description: A vallete deployment.
    variables:
      host:
        default: localhost:8443
tags:
  - name: probes
    description: Liveness and readiness, for orchestrators and load balancers.
  - name: publish
    description: The unauthenticated read path consumed by sshd and by operators.
  - name: docs
    description: |
      This document, served by the server that implements it (ADR-0021).
      Enabled by default; a deployer may disable it, and every route below then
      answers `404` exactly as an unrouted path does.
  - name: devices
    description: |
      The owner's device inventory. Every operation is scoped to the owner
      carried by the bearer token.
paths:
  /healthz:
    get:
      tags: [probes]
      operationId: getHealthz
      summary: Liveness probe.
      description: |
        Reports on the process alone and performs no dependency checks: if this
        handler runs, the process is alive and must not be restarted. It cannot
        fail with a non-2xx of its own.
      responses:
        "200":
          $ref: "#/components/responses/Status"
  /readyz:
    get:
      tags: [probes]
      operationId: getReadyz
      summary: Readiness probe.
      description: |
        Reflects database health and **fails closed**: `200` is returned only
        when the datastore answers within the internal 2s deadline. A missing
        datastore, an error, and a timeout are all reported as `503`, with no
        indication of which, so an unauthenticated probe cannot map the
        deployment's dependencies.
      responses:
        "200":
          $ref: "#/components/responses/Status"
        "503":
          $ref: "#/components/responses/Unavailable"
  /docs:
    get:
      tags: [docs]
      operationId: getDocsRedirect
      summary: Redirect to the canonical documentation path.
      description: |
        Exists so the path a human types resolves. The target is the fixed
        string `/docs/`; no part of the request contributes to it, so this
        cannot be driven into an open redirect.
      responses:
        "301":
          description: Moved permanently to `/docs/`.
        "404":
          $ref: "#/components/responses/RoutingNotFound"
  /docs/:
    get:
      tags: [docs]
      operationId: getDocs
      summary: Fetch this document in the representation you ask for.
      description: |
        Content-negotiated on `Accept`. **JSON is the default and the fallback**
        — an absent, wildcard, unparseable, or unsatisfiable `Accept` all yield
        `application/json` rather than an error, because an endpoint that serves
        one static document has no reason to refuse a request. YAML is returned
        only when the client ranks it strictly above JSON; `application/yaml`,
        `text/yaml`, and `application/x-yaml` are all understood. Quality values
        are honored with RFC 9110 specificity, so an explicit preference beats
        a trailing `*/*`.

        A browser gets `text/html`: a rendered UI whose markup, styles, and
        script are embedded in the binary and served in this one response. It
        loads no external assets, and its `Content-Security-Policy` pins the
        inline script and style by SHA-256 hash under `default-src 'none'`,
        with no `unsafe-inline` and no `unsafe-eval`. `curl`, which sends no
        `Accept`, is unaffected and receives JSON.

        The response carries `Vary: Accept`; a cache that ignored it would serve
        one client's representation to another.

        Prefer `/docs/spec/openapi.json` or `/docs/spec/openapi.yaml` for
        tooling: negotiation is a convenience, not the contract.
      parameters:
        - $ref: "#/components/parameters/IfNoneMatch"
      responses:
        "200":
          description: The API contract, as JSON, YAML, or a rendered page.
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
            Vary:
              description: Always `Accept`, because the body depends on it.
              required: true
              schema:
                type: string
          content:
            application/json: {}
            application/yaml: {}
            text/html: {}
        "304":
          $ref: "#/components/responses/NotModified"
        "404":
          $ref: "#/components/responses/RoutingNotFound"
  /docs/spec/openapi.json:
    get:
      tags: [docs]
      operationId: getDocsSpecJSON
      summary: Fetch this document as JSON at a fixed URL.
      description: |
        The same document `/docs/` serves, at a deterministic path that ignores
        `Accept`. Converted at runtime from the one embedded YAML source, so the
        two representations cannot disagree.
      parameters:
        - $ref: "#/components/parameters/IfNoneMatch"
      responses:
        "200":
          description: The API contract as JSON.
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json: {}
        "304":
          $ref: "#/components/responses/NotModified"
        "404":
          $ref: "#/components/responses/RoutingNotFound"
  /docs/spec/openapi.yaml:
    get:
      tags: [docs]
      operationId: getDocsSpecYAML
      summary: Fetch this document as YAML at a fixed URL.
      description: |
        The bytes embedded in the binary at build time, verbatim — comments and
        formatting intact, never re-serialized and never read from disk.
      parameters:
        - $ref: "#/components/parameters/IfNoneMatch"
      responses:
        "200":
          description: The API contract as YAML.
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/yaml: {}
        "304":
          $ref: "#/components/responses/NotModified"
        "404":
          $ref: "#/components/responses/RoutingNotFound"
  /{handle}:
    parameters:
      - $ref: "#/components/parameters/Handle"
    get:
      tags: [publish]
      operationId: getDefaultKeySet
      summary: Fetch an owner's default key set.
      description: |
        Returns the key set the owner designated as their default (ADR-0016).
      parameters:
        - $ref: "#/components/parameters/IfNoneMatch"
      responses:
        "200":
          $ref: "#/components/responses/AuthorizedKeys"
        "304":
          $ref: "#/components/responses/NotModified"
        "404":
          $ref: "#/components/responses/UniformNotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    head:
      tags: [publish]
      operationId: headDefaultKeySet
      summary: Headers for an owner's default key set.
      parameters:
        - $ref: "#/components/parameters/IfNoneMatch"
      responses:
        "200":
          $ref: "#/components/responses/AuthorizedKeysHead"
        "304":
          $ref: "#/components/responses/NotModified"
        "404":
          $ref: "#/components/responses/UniformNotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /{handle}/{set}:
    parameters:
      - $ref: "#/components/parameters/Handle"
      - $ref: "#/components/parameters/Set"
    get:
      tags: [publish]
      operationId: getKeySet
      summary: Fetch a named key set.
      responses:
        "200":
          $ref: "#/components/responses/AuthorizedKeys"
        "304":
          $ref: "#/components/responses/NotModified"
        "404":
          $ref: "#/components/responses/UniformNotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    head:
      tags: [publish]
      operationId: headKeySet
      summary: Headers for a named key set.
      responses:
        "200":
          $ref: "#/components/responses/AuthorizedKeysHead"
        "304":
          $ref: "#/components/responses/NotModified"
        "404":
          $ref: "#/components/responses/UniformNotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/devices:
    get:
      tags: [devices]
      operationId: listDevices
      summary: List the token owner's devices.
      description: |
        Returns every device belonging to the owner the bearer token identifies,
        including revoked ones — the owner is entitled to see its own history,
        and hiding revoked devices would make a revoked one indistinguishable
        from one that was never registered.

        No other owner's device can appear, and there is no parameter by which
        another owner's inventory could be requested.

        Requires a token that is not bound to a single resource: a device-bound
        token is refused here, because this operation addresses the account
        rather than any one device.
      security:
        - bearerAuth: []
      responses:
        "200":
          $ref: "#/components/responses/DeviceList"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ManagementInternalError"
    post:
      tags: [devices]
      operationId: registerDevice
      summary: Register a device for the token owner.
      description: |
        Creates a device owned by the bearer token's owner and returns it with a
        freshly minted, unguessable identifier.

        The request body carries a name and nothing else. There is no owner
        field, and an unrecognized field is an error rather than being ignored.

        Requires a token that permits mutation and is not bound to a single
        resource: a read-only token and a device-bound token are both refused.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterDeviceRequest"
            example: { name: "work laptop" }
      responses:
        "201":
          $ref: "#/components/responses/DeviceCreated"
        "400":
          $ref: "#/components/responses/ManagementBadRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ManagementInternalError"
  /api/v1/devices/{deviceID}:
    parameters:
      - $ref: "#/components/parameters/DeviceID"
    delete:
      tags: [devices]
      operationId: revokeDevice
      summary: Revoke one of the token owner's devices.
      description: |
        Marks the device revoked. The device is not deleted; it remains in the
        owner's list with a `revoked` status and a `revoked_at` timestamp.

        `204` is returned only for the transition from active to revoked.
        Repeating the call answers `404`, identically to an unknown identifier
        and to another owner's identifier — see the enumeration note in the API
        description. Repeating is therefore safe: it changes nothing, and it
        discloses nothing about whether the device ever existed.

        Requires a token that permits mutation. A device-bound token may revoke
        only the device it is bound to.
      security:
        - bearerAuth: []
      responses:
        "204":
          $ref: "#/components/responses/DeviceRevoked"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/ManagementNotFound"
        "500":
          $ref: "#/components/responses/ManagementInternalError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        An access token issued by the enrollment flow. Exactly one
        `Authorization` header is accepted; two is a request-smuggling shape and
        is refused rather than resolved.
  parameters:
    Handle:
      name: handle
      in: path
      required: true
      description: The owner's handle. Reserved terms are not routable as handles (ADR-0017).
      schema:
        type: string
    Set:
      name: set
      in: path
      required: true
      description: The key set name, scoped to the handle's owner.
      schema:
        type: string
    DeviceID:
      name: deviceID
      in: path
      required: true
      description: |
        The device's opaque, unguessable identifier, as returned by the register
        and list operations. It is not derived from the device's name or from
        anything else a caller could reconstruct.
      schema:
        type: string
    IfNoneMatch:
      name: If-None-Match
      in: header
      required: false
      description: |
        A previously returned `ETag`, or `*`. Compared with the weak comparison
        RFC 9110 prescribes for this header, so a `W/` prefix is ignored. A
        value that does not parse simply fails to match and yields a full `200`
        — the safe direction, since a wrongly matched tag would answer `304` and
        leave a consumer using a key list it should have replaced.
      schema:
        type: string
  headers:
    ETag:
      description: |
        A strong entity tag: the SHA-256 of the body. Because it is derived from
        the content rather than from a clock or a random token, it is stable
        across restarts, rebuilds, and replicas, so any instance can validate a
        tag any other instance issued.
      required: true
      schema:
        type: string
    CacheControlPublic:
      description: |
        `public, max-age=60`. The TTL bounds the revocation window on the cached
        path: a revoked key can be honored by a cache for at most this long.
      required: true
      schema:
        type: string
    CacheControlNoStore:
      description: |
        `no-store`. Failure and probe responses are never cached. A cached
        negative would keep answering `404` after the owner published the set,
        and a cached probe would let an unhealthy instance keep passing.
      required: true
      schema:
        type: string
    VaryAuthorization:
      description: |
        Always `Authorization`. It is set on every access-gated response,
        success and refusal alike (ADR-0019). The success path is where it
        matters most: two owners issuing the same request each see a body they
        alone may see, and a shared cache without this header would serve the
        first one's devices to the second.
      required: true
      schema:
        type: string
    ContentTypeOptions:
      description: Always `nosniff`.
      required: true
      schema:
        type: string
    ContentLength:
      description: |
        Set explicitly rather than inferred from what was written, so it is
        accurate on a `HEAD` response that carries no body.
      required: true
      schema:
        type: integer
  responses:
    Status:
      description: The instance is healthy.
      headers:
        Cache-Control:
          $ref: "#/components/headers/CacheControlNoStore"
        X-Content-Type-Options:
          $ref: "#/components/headers/ContentTypeOptions"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Status"
          examples:
            live:
              value: { status: ok, version: 0.1.0 }
            ready:
              value: { status: ready, version: 0.1.0 }
    Unavailable:
      description: |
        The instance is not ready to serve traffic and should be removed from
        the load balancer. The reason is logged, never returned.
      headers:
        Cache-Control:
          $ref: "#/components/headers/CacheControlNoStore"
        X-Content-Type-Options:
          $ref: "#/components/headers/ContentTypeOptions"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Status"
          example: { status: unavailable }
    AuthorizedKeys:
      description: |
        The key set, as a native `authorized_keys` document: one canonical,
        options-free line per active key, in a deterministic order so identical
        content yields a stable `ETag`. An existing but empty set is a `200`
        with an empty body, not a `404`.
      headers:
        ETag:
          $ref: "#/components/headers/ETag"
        Cache-Control:
          $ref: "#/components/headers/CacheControlPublic"
        X-Content-Type-Options:
          $ref: "#/components/headers/ContentTypeOptions"
        Content-Length:
          $ref: "#/components/headers/ContentLength"
      content:
        text/plain:
          schema:
            type: string
          example: |
            ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIExampleKeyMaterial01234567890abc owner@example
    AuthorizedKeysHead:
      description: |
        Identical status and headers to the `GET`, with no body. `Content-Length`
        still reports the size the body would have had.
      headers:
        ETag:
          $ref: "#/components/headers/ETag"
        Cache-Control:
          $ref: "#/components/headers/CacheControlPublic"
        X-Content-Type-Options:
          $ref: "#/components/headers/ContentTypeOptions"
        Content-Length:
          $ref: "#/components/headers/ContentLength"
    NotModified:
      description: |
        The consumer's copy is current. The response carries no body.

        It repeats the `ETag` and `Cache-Control` deliberately: a conditional
        response that dropped its validator would leave the consumer with
        nothing to revalidate against next time, silently degrading every
        subsequent request into a full fetch.
      headers:
        ETag:
          $ref: "#/components/headers/ETag"
        Cache-Control:
          $ref: "#/components/headers/CacheControlPublic"
    RoutingNotFound:
      description: |
        This path is not routed. Returned when the documentation endpoints are
        disabled, and byte-for-byte identical to the response any unrouted path
        produces, so probing cannot reveal that the feature exists to be
        disabled. Distinct from the publish `404`, which is a handler response
        with its own cache directives.
      headers:
        X-Content-Type-Options:
          $ref: "#/components/headers/ContentTypeOptions"
      content:
        text/plain:
          schema:
            type: string
          example: "404 page not found\n"
    UniformNotFound:
      description: |
        No key set is served for this path. This single response covers every
        negative verdict, and the cases cannot be told apart — see the
        enumeration note in the API description. It carries no `ETag` and is not
        cacheable.
      headers:
        Cache-Control:
          $ref: "#/components/headers/CacheControlNoStore"
        X-Content-Type-Options:
          $ref: "#/components/headers/ContentTypeOptions"
        Content-Length:
          $ref: "#/components/headers/ContentLength"
      content:
        text/plain:
          schema:
            type: string
          example: "not found\n"
    DeviceList:
      description: The owner's devices. An owner with none gets an empty array, not a `404`.
      headers:
        Cache-Control:
          $ref: "#/components/headers/CacheControlNoStore"
        X-Content-Type-Options:
          $ref: "#/components/headers/ContentTypeOptions"
        Vary:
          $ref: "#/components/headers/VaryAuthorization"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DeviceList"
          example:
            devices:
              - id: PBQKV3XZ2YJ7N4M8RTFC6WDGHA
                name: work laptop
                status: active
                created_at: "2026-07-20T12:00:00Z"
                updated_at: "2026-07-20T12:00:00Z"
    DeviceCreated:
      description: The device was registered.
      headers:
        Cache-Control:
          $ref: "#/components/headers/CacheControlNoStore"
        X-Content-Type-Options:
          $ref: "#/components/headers/ContentTypeOptions"
        Vary:
          $ref: "#/components/headers/VaryAuthorization"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Device"
          example:
            id: PBQKV3XZ2YJ7N4M8RTFC6WDGHA
            name: work laptop
            status: active
            created_at: "2026-07-20T12:00:00Z"
            updated_at: "2026-07-20T12:00:00Z"
    DeviceRevoked:
      description: |
        The device was revoked. The response carries no body: there is nothing
        to report beyond the fact of the transition, and a body would be a place
        for detail this operation deliberately does not disclose.
      headers:
        Vary:
          $ref: "#/components/headers/VaryAuthorization"
    Unauthenticated:
      description: |
        No usable credential was presented, or the token is expired, revoked, or
        unverifiable. The cases are not distinguishable.

        The `WWW-Authenticate` challenge names the scheme and nothing else: RFC
        6750's `error` codes are precisely the distinctions this response exists
        to erase.

        This status depends solely on the presented token and never on whether
        the addressed device exists, because authorization refuses before any
        handler runs and no lookup has happened.
      headers:
        WWW-Authenticate:
          description: Always the bare value `Bearer`, with no realm and no error parameter.
          required: true
          schema:
            type: string
        Cache-Control:
          $ref: "#/components/headers/CacheControlNoStore"
        Vary:
          $ref: "#/components/headers/VaryAuthorization"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example: { status: error }
    Forbidden:
      description: |
        The token is valid but its grant does not cover this request — a
        read-only token attempting a mutation, or a resource-bound token
        addressing something outside its binding.

        It discloses nothing about what exists. The verdict is computed from the
        token's own claims against the request the caller composed; no storage
        is read to produce it.
      headers:
        Cache-Control:
          $ref: "#/components/headers/CacheControlNoStore"
        Vary:
          $ref: "#/components/headers/VaryAuthorization"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example: { status: error }
    ManagementNotFound:
      description: |
        No such device for this caller. This single response covers an unknown
        identifier, another owner's identifier, and an already-revoked device;
        the cases cannot be told apart — see the enumeration note in the API
        description.
      headers:
        Cache-Control:
          $ref: "#/components/headers/CacheControlNoStore"
        Vary:
          $ref: "#/components/headers/VaryAuthorization"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example: { status: error }
    ManagementBadRequest:
      description: |
        The request body is unreadable, oversized, carries an unrecognized
        field, or names an invalid device name.

        It reports on nothing but what the caller just sent, which is why it is
        safe for this surface to say "bad request" at all rather than collapsing
        into the uniform `404`. The body still names no field and no reason.
      headers:
        Cache-Control:
          $ref: "#/components/headers/CacheControlNoStore"
        Vary:
          $ref: "#/components/headers/VaryAuthorization"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example: { status: error }
    ManagementInternalError:
      description: |
        An internal fault, including a management route reached on a deployment
        where the service behind it was not wired. The cause is in the server
        log and never on the wire.

        A wiring fault is deliberately a `500` and not a `404`: degrading into
        "not found" would be indistinguishable from a genuine miss and would
        hide a broken deployment behind a plausible answer.
      headers:
        Cache-Control:
          $ref: "#/components/headers/CacheControlNoStore"
        Vary:
          $ref: "#/components/headers/VaryAuthorization"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example: { status: error }
    InternalError:
      description: |
        An internal fault. The body is fixed text; the cause is in the server
        log and never on the wire, because the failure reasons name internal
        state that an unauthenticated caller has no business learning.
      headers:
        Cache-Control:
          $ref: "#/components/headers/CacheControlNoStore"
        X-Content-Type-Options:
          $ref: "#/components/headers/ContentTypeOptions"
        Content-Length:
          $ref: "#/components/headers/ContentLength"
      content:
        text/plain:
          schema:
            type: string
          example: "internal server error\n"
  schemas:
    Status:
      type: object
      description: |
        Carries no diagnostics. An unauthenticated probe must not disclose which
        dependency failed or why, since that maps the deployment for an attacker.
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, ready, unavailable]
        version:
          type: string
          description: The running server's version. Omitted when unavailable.
      additionalProperties: false
    Error:
      type: object
      description: |
        The uniform management error body. It carries a single constant field
        and no diagnostics.

        There is deliberately no code, message, or field pointer. Every error on
        this surface is this exact object, which is what makes a `404` for
        another owner's device byte-identical to a `404` for a device that never
        existed.
      required: [status]
      properties:
        status:
          type: string
          enum: [error]
      additionalProperties: false
    RegisterDeviceRequest:
      type: object
      description: |
        A device registration. It carries a name and nothing else.

        `additionalProperties: false` is the contract, and the server enforces
        it by rejecting the request rather than dropping the extra field. That
        matters most for a field this schema does not have: there is no owner
        property, so a body attempting to name one is refused instead of
        silently having its claim ignored.
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 64
          description: |
            A display name: 1–64 printable characters, no control characters,
            no leading or trailing whitespace. It is not an identifier and need
            not be unique.
      additionalProperties: false
    Device:
      type: object
      description: |
        A device in the owner's inventory.

        It carries no owner field. That would be redundant — a caller only ever
        sees its own devices — and echoing an owner back would invite clients to
        start sending one, which is the shape the register request exists to
        prevent.
      required: [id, name, status, created_at, updated_at]
      properties:
        id:
          type: string
          description: The opaque, unguessable device identifier.
        name:
          type: string
        status:
          type: string
          enum: [active, revoked]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time
          description: Present only when the device is revoked.
      additionalProperties: false
    DeviceList:
      type: object
      description: |
        The devices are wrapped in an object rather than returned as a bare
        array, so the response can gain fields later without breaking consumers.
      required: [devices]
      properties:
        devices:
          type: array
          items:
            $ref: "#/components/schemas/Device"
      additionalProperties: false
