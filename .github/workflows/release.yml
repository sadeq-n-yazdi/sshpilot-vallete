name: Release

# Signing runs only when a release is published in this repository.
#
# This trigger choice is the primary fork-safety control. `release: published`
# never fires for a pull request, so untrusted PR content -- from a fork or
# otherwise -- has no path into this workflow at all. pull_request_target is
# deliberately not used anywhere in this repository: it would run fork-authored
# code against the base repository's secrets and OIDC identity, which is
# precisely the exposure this workflow exists to avoid.
on:
  release:
    types: [published]

# Least privilege by default. Only the release job below is elevated, and only
# to the two scopes signing and publishing actually require.
permissions:
  contents: read

env:
  GO_VERSION: "1.26"

jobs:
  release:
    name: build, sign & publish
    runs-on: ubuntu-latest

    # Belt and braces alongside the trigger: a fork that somehow published a
    # release in its own copy of the repository still cannot run this job.
    if: github.repository == 'sadeq-n-yazdi/sshpilot-vallete'

    permissions:
      # Required for cosign keyless signing: the job exchanges this short-lived
      # OIDC token with Fulcio for an ephemeral signing certificate. No
      # long-lived private key exists in repository secrets, so there is no
      # signing key to steal, rotate, or leak.
      id-token: write
      # Required only to attach the signed artifacts to the release.
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # The release tag is checked out explicitly rather than trusting the
          # default ref, and credentials are not persisted into .git/config --
          # the token is handed only to the single publish step that needs it.
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      # The tag reaches the shell through the environment, never through direct
      # ${{ }} interpolation into a run block, which would allow a crafted tag
      # name to be executed as shell.
      - name: Build release binary
        env:
          VERSION: ${{ github.event.release.tag_name }}
        run: make dist

      # The release artifact is only meaningfully verifiable if anyone can
      # rebuild it and get the same bytes, so reproducibility is confirmed
      # before anything is signed.
      - name: Verify build is reproducible
        run: make repro

      - name: Generate SBOM
        run: make sbom

      - name: Generate checksums
        working-directory: dist
        run: sha256sum valletd sbom.cdx.json > checksums.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Keyless (Sigstore) signing. The certificate binds the signature to this
      # workflow's OIDC identity and the whole event is recorded in the public
      # Rekor transparency log, so a signature that did not come from this
      # workflow in this repository is detectable.
      #
      # Verify a downloaded artifact with:
      #   cosign verify-blob \
      #     --certificate valletd.pem \
      #     --signature valletd.sig \
      #     --certificate-identity-regexp \
      #       '^https://github.com/sadeq-n-yazdi/sshpilot-vallete/\.github/workflows/release\.yml@' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
      #     valletd
      - name: Sign artifacts
        working-directory: dist
        run: |
          set -euo pipefail
          for artifact in valletd sbom.cdx.json checksums.txt; do
            cosign sign-blob --yes \
              --output-signature "${artifact}.sig" \
              --output-certificate "${artifact}.pem" \
              "${artifact}"
          done

      # GITHUB_TOKEN is scoped to this one step. No earlier step -- including
      # the build, which executes third-party module code -- can read it.
      - name: Publish signed artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          gh release upload "$TAG" \
            dist/valletd dist/valletd.sig dist/valletd.pem \
            dist/sbom.cdx.json dist/sbom.cdx.json.sig dist/sbom.cdx.json.pem \
            dist/checksums.txt dist/checksums.txt.sig dist/checksums.txt.pem \
            --clobber
